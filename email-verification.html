<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="description" content="Verify your email address for Invisible Incident.">
  <title>Email Verification | Invisible Incident</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="index.html" aria-label="Invisible Incident home">Invisible Incident</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="types-of-injury.html">Pinned Stories</a></li>
        <li><a href="forum-for-discussion.html">Forum for Discussion</a></li>
        <li>
          <a class="nav-auth-link" href="profile.html" data-auth-nav-link aria-label="Log in">
            <span class="nav-profile-avatar" data-auth-avatar aria-hidden="true"></span>
            <span data-auth-label>Log in</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main id="main-content">
    <section class="forum-gate" aria-labelledby="email-verification-title">
      <div class="signin-panel">
        <p class="section-kicker">Email Verification</p>
        <h1 id="email-verification-title">Verify with email</h1>
        <p class="signin-copy">Enter your email address to receive a secure sign-in link and one-time code.</p>

        <form class="email-signup" id="magic-link-form">
          <label for="magic-email">Email address</label>
          <div class="email-row">
            <input id="magic-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
            <button id="magic-link-submit" type="submit">Send OTP / Link for account creation</button>
          </div>

          <div class="email-otp-section">
            <label for="magic-otp">One-time code</label>
            <input id="magic-otp" name="otp" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="One-time code">
            <button id="magic-otp-confirm" type="button">Confirm OTP</button>
          </div>
        </form>

        <p class="auth-message" id="auth-message" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>
</body>
</html>
